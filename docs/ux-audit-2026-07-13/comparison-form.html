<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SSH Man compact form comparison</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 20px;
        background: #070a10;
        color: #f5f7ff;
        font: 600 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        display: grid;
        grid-template-columns: repeat(2, 420px);
        gap: 20px;
        width: 860px;
        margin: 0 auto;
      }
      figure { margin: 0; }
      figcaption {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        min-height: 30px;
      }
      figcaption span {
        color: #8f98ad;
        font-size: 12px;
        font-weight: 500;
      }
      img {
        display: block;
        width: 420px;
        height: 720px;
        border: 1px solid #303749;
        border-radius: 16px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <main aria-label="Before and after compact tunnel-form comparison">
      <figure>
        <figcaption>Before <span>completion action below the fold</span></figcaption>
        <img src="07-current-tunnel-dialog-mobile.png" alt="Original compact tunnel form" />
      </figure>
      <figure>
        <figcaption>React rewrite <span>persistent context and actions</span></figcaption>
        <img src="11-react-tunnel-form-mobile.png" alt="Redesigned compact tunnel form" />
      </figure>
    </main>
  </body>
</html>
