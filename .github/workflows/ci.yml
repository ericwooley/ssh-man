name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash ./scripts/validate-commit-range.sh "$BASE_SHA" "$HEAD_SHA"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.5
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Validate
        run: ./scripts/validate.sh

      - name: Confirm generated files are current
        run: git diff --exit-code

  vm-e2e:
    name: VM E2E
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Multipass
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v multipass >/dev/null 2>&1; then
            sudo snap install multipass
          fi
          sudo snap start multipass

          for attempt in {1..30}; do
            if multipass version; then
              exit 0
            fi
            sleep 2
          done

          sudo snap services multipass
          exit 1

      - name: Run disposable VM E2E
        run: |
          ./scripts/e2e-vm.sh

      - name: Upload VM E2E logs
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ssh-man-vm-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/e2e-vm
          if-no-files-found: warn
          retention-days: 7
