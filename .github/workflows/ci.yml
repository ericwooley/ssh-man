name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash ./scripts/validate-commit-range.sh "$BASE_SHA" "$HEAD_SHA"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.17.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Validate
        run: ./scripts/validate.sh

      - name: Confirm generated files are current
        run: git diff --exit-code

  vm-e2e:
    name: VM E2E
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Multipass
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v multipass >/dev/null 2>&1; then
            sudo snap install multipass
          fi
          sudo snap start multipass
          sudo install -d -m 0755 \
            /var/snap/multipass/common/ssh-man-e2e-tmp

          for attempt in {1..30}; do
            if sudo multipass version 2>&1 | grep -q '^multipassd '; then
              sudo multipass version
              exit 0
            fi
            sleep 2
          done

          sudo multipass version
          sudo snap services multipass
          exit 1

      - name: Run disposable VM E2E
        run: |
          sudo env \
            TMPDIR=/var/snap/multipass/common/ssh-man-e2e-tmp \
            SSH_MAN_E2E_MULTIPASS_BIN=/snap/bin/multipass \
            SSH_MAN_E2E_ARTIFACT_DIR="$GITHUB_WORKSPACE/build/e2e-vm/run-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" \
            ./scripts/e2e-vm.sh

      - name: Upload VM E2E logs
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ssh-man-vm-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/e2e-vm
          if-no-files-found: warn
          retention-days: 7
