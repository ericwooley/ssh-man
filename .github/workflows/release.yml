name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Resolve release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install --dir frontend --frozen-lockfile

      - name: Build frontend assets
        run: pnpm --dir frontend run build

      - name: Run backend tests
        run: go test ./...

      - name: Run frontend tests
        run: pnpm --dir frontend run test

      - name: Build release artifact
        run: bash ./scripts/package-darwin-release.sh "$VERSION"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ssh-man ${{ env.VERSION }}
          generate_release_notes: true
          files: dist/ssh-man.dmg

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ericwooley/homebrew-apps
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-apps

      - name: Calculate release SHA256
        run: |
          SHA="$(shasum -a 256 dist/ssh-man.dmg | awk '{print $1}')"
          echo "SHA=$SHA" >> "$GITHUB_ENV"

      - name: Update Homebrew cask
        run: |
          ruby <<'RUBY'
          path = "homebrew-apps/Casks/ssh-man.rb"
          content = File.read(path)

          content.sub!(/version ".*"/, %(version "#{ENV.fetch("VERSION")}"))
          content.sub!(/sha256 ".*"/, %(sha256 "#{ENV.fetch("SHA")}"))
          content.sub!(%r{url ".*"}, %(url "https://github.com/ericwooley/ssh-man/releases/download/#{ENV.fetch("GITHUB_REF_NAME")}/ssh-man.dmg"))

          File.write(path, content)
          RUBY

      - name: Commit and push tap update
        run: |
          cd homebrew-apps

          if git diff --quiet -- Casks/ssh-man.rb; then
            printf 'Homebrew cask already up to date.\n'
            exit 0
          fi

          git add Casks/ssh-man.rb
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "Update ssh-man to ${VERSION}"
          git push
