name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  plan-release:
    name: Plan semantic release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      release_required: ${{ steps.plan.outputs.release_required }}
      current_version: ${{ steps.plan.outputs.current_version }}
      release_type: ${{ steps.plan.outputs.release_type }}
      next_version: ${{ steps.plan.outputs.next_version }}

    steps:
      - name: Checkout repository history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Plan release from Conventional Commits
        id: plan
        shell: bash
        run: bash ./scripts/plan-release.sh >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build and test macOS release
    needs: plan-release
    if: needs.plan-release.outputs.release_required == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.17.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --dir frontend --frozen-lockfile

      - name: Build frontend assets
        run: pnpm --dir frontend run build

      - name: Run backend tests
        run: go test ./...

      - name: Run frontend tests
        run: pnpm --dir frontend run test

      - name: Build release artifact
        run: bash ./scripts/package-darwin-release.sh "${{ needs.plan-release.outputs.next_version }}"

      - name: Archive app bundle for protected signing
        shell: bash
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent \
            build/bin/ssh-man.app \
            dist/ssh-man-app.zip

      - name: Upload app bundle for protected signing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ssh-man-app-${{ needs.plan-release.outputs.next_version }}
          path: dist/ssh-man-app.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  publish-release:
    name: Sign, notarize, publish, and update Homebrew
    needs:
      - plan-release
      - build-macos
    if: needs.plan-release.outputs.release_required == 'true' && github.repository == 'ericwooley/ssh-man'
    runs-on: macos-26
    timeout-minutes: 45
    environment: release
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.plan-release.outputs.next_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Download app bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ssh-man-app-${{ needs.plan-release.outputs.next_version }}
          path: dist

      - name: Restore app bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/bin
          ditto -x -k dist/ssh-man-app.zip build/bin
          test -x build/bin/ssh-man.app/Contents/MacOS/ssh-man

      - name: Install Developer ID certificate and notarization credentials
        shell: bash
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/ssh-man-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ssh-man-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_DEVELOPER_ID_P12_BASE64" | \
            base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          IDENTITIES="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" | \
              sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p'
          )"
          IDENTITY_COUNT="$(printf '%s\n' "$IDENTITIES" | awk 'NF { count++ } END { print count + 0 }')"
          if [ "$IDENTITY_COUNT" -ne 1 ]; then
            printf 'Expected exactly one Developer ID Application identity, found %s.\n' "$IDENTITY_COUNT" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2
            exit 1
          fi

          SIGNING_IDENTITY="$(printf '%s\n' "$IDENTITIES" | awk 'NF { print; exit }')"
          case "$SIGNING_IDENTITY" in
            *"($APPLE_TEAM_ID)") ;;
            *)
              printf 'Developer ID identity does not match Apple Team ID %s: %s\n' \
                "$APPLE_TEAM_ID" "$SIGNING_IDENTITY" >&2
              exit 1
              ;;
          esac

          xcrun notarytool store-credentials ssh-man-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --keychain "$KEYCHAIN_PATH" \
            --validate

          printf 'APPLE_SIGNING_IDENTITY=%s\n' "$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          printf 'APPLE_NOTARY_KEYCHAIN_PATH=%s\n' "$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          printf 'APPLE_NOTARY_KEYCHAIN_PROFILE=ssh-man-notary\n' >> "$GITHUB_ENV"

      - name: Sign and notarize release artifact
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          bash ./scripts/sign-notarize-darwin-release.sh \
            "$VERSION" \
            build/bin/ssh-man.app \
            dist/ssh-man.dmg

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.plan-release.outputs.next_version }}
          name: ssh-man ${{ needs.plan-release.outputs.next_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/ssh-man.dmg

      - name: Checkout tap repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ericwooley/homebrew-apps
          ref: main
          path: homebrew-apps
          persist-credentials: false

      - name: Calculate release SHA256
        shell: bash
        run: |
          set -euo pipefail
          SHA="$(shasum -a 256 dist/ssh-man.dmg | awk '{print $1}')"
          printf 'SHA=%s\n' "$SHA" >> "$GITHUB_ENV"

      - name: Update Homebrew cask
        shell: bash
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          path = "homebrew-apps/Casks/ssh-man.rb"
          content = File.read(path)

          replacements = {
            /version ".*"/ => %(version "#{ENV.fetch("VERSION")}"),
            /sha256 ".*"/ => %(sha256 "#{ENV.fetch("SHA")}"),
            %r{url ".*"} => %(url "https://github.com/ericwooley/ssh-man/releases/download/#{ENV.fetch("VERSION")}/ssh-man.dmg"),
          }
          replacements.each do |pattern, replacement|
            raise "Missing expected cask field matching #{pattern.inspect}" unless content.sub!(pattern, replacement)
          end

          app_stanza = %(  app "ssh-man.app")
          binary_stanza = %(  binary "\#{appdir}/ssh-man.app/Contents/MacOS/ssh-man")
          macos_dependency = %(  depends_on :macos)

          content.sub!(
            %(  desc "Manage your SSH tunnels and SOCKS5 proxies."),
            %(  desc "Manage your SSH tunnels and SOCKS5 proxies"),
          )
          unless content.include?(macos_dependency)
            raise "Missing expected app stanza" unless content.include?(app_stanza)

            content.sub!(app_stanza, "#{macos_dependency}\n\n#{app_stanza}")
          end
          unless content.include?(binary_stanza)
            raise "Missing expected app stanza" unless content.include?(app_stanza)

            content.sub!(app_stanza, "#{app_stanza}\n#{binary_stanza}")
          end

          File.write(path, content)
          RUBY

      - name: Validate Homebrew cask
        shell: bash
        run: |
          set -euo pipefail
          ruby -c homebrew-apps/Casks/ssh-man.rb
          grep -F 'binary "#{appdir}/ssh-man.app/Contents/MacOS/ssh-man"' homebrew-apps/Casks/ssh-man.rb

          TAP_ROOT="$(brew --repository)/Library/Taps/ericwooley"
          TAP_PATH="$TAP_ROOT/homebrew-apps"
          if [ -e "$TAP_PATH" ]; then
            printf 'Unexpected pre-existing Homebrew tap path: %s\n' "$TAP_PATH" >&2
            exit 1
          fi
          mkdir -p "$TAP_ROOT"
          ln -s "$GITHUB_WORKSPACE/homebrew-apps" "$TAP_PATH"
          trap 'rm -f "$TAP_PATH"' EXIT
          HOMEBREW_NO_AUTO_UPDATE=1 brew style --cask ericwooley/apps/ssh-man
          rm -f "$TAP_PATH"
          trap - EXIT

      - name: Commit tap update
        shell: bash
        run: |
          set -euo pipefail
          cd homebrew-apps

          if git diff --quiet -- Casks/ssh-man.rb; then
            printf 'Homebrew cask already up to date.\n'
            exit 0
          fi

          git add Casks/ssh-man.rb
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "Update ssh-man to ${VERSION}"

      - name: Push tap update
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd homebrew-apps

          if git diff --quiet HEAD origin/main; then
            printf 'No Homebrew tap commit to push.\n'
            exit 0
          fi

          gh auth setup-git
          git push origin HEAD:main

      - name: Remove signing credentials
        if: always()
        shell: bash
        run: |
          security delete-keychain "$RUNNER_TEMP/ssh-man-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/ssh-man-developer-id.p12"
