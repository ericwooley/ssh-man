name: Publish to Homebrew Tap

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-tap:
    if: ${{ !github.event.release.draft && !github.event.release.prerelease }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release metadata
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download DMG from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            if gh release download "$TAG" --repo "${{ github.repository }}" --pattern "ssh-man.dmg" --clobber; then
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              printf 'Unable to download ssh-man.dmg for release %s\n' "$TAG" >&2
              exit 1
            fi

            sleep 10
          done

      - name: Calculate SHA256
        run: |
          SHA="$(shasum -a 256 ssh-man.dmg | awk '{print $1}')"
          echo "SHA=$SHA" >> "$GITHUB_ENV"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ericwooley/homebrew-apps
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-apps

      - name: Update cask
        run: |
          ruby <<'RUBY'
          path = "homebrew-apps/Casks/ssh-man.rb"
          content = File.read(path)

          content.sub!(/version ".*"/, %(version "#{ENV.fetch("VERSION")}"))
          content.sub!(/sha256 ".*"/, %(sha256 "#{ENV.fetch("SHA")}"))
          content.sub!(%r{url ".*"}, %(url "https://github.com/ericwooley/ssh-man/releases/download/#{ENV.fetch("TAG")}/ssh-man.dmg"))

          File.write(path, content)
          RUBY

      - name: Commit and push tap update
        run: |
          cd homebrew-apps

          if git diff --quiet -- Casks/ssh-man.rb; then
            printf 'Homebrew cask already up to date.\n'
            exit 0
          fi

          git add Casks/ssh-man.rb
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "Update ssh-man to ${VERSION}"
          git push
